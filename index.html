<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Bayern München Quiz - Ultimate Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="quote-left" class="quote-box"></div>
    
    <div class="quiz-container">
        <h1>FC Bayern Quiz</h1>
        
        <div class="stats-header">
            <div class="score-board">Punkte: <span id="score">0</span></div>
            <div class="highscore-board">Highscore: <span id="highscore">0</span></div>
        </div>

        <div class="tools-header">
            <button id="joker-btn" class="btn-joker" title="50:50 Joker einsetzen">🪄 50:50 Joker</button>
            <div id="timer-bar-container">
                <div id="timer-bar"></div>
            </div>
        </div>
        
        <div id="quiz">
            <h2 id="question" aria-live="polite">Frage lädt...</h2>
            <div id="answer-buttons" class="btn-grid">
                </div>
        </div>

        <div id="result-message" aria-live="polite"></div>
        
        <div id="explanation-box" class="explanation-box"></div>

        <button id="next-btn" class="btn btn-next" style="display: none;">Nächste Frage</button>
    </div>

    <div id="quote-right" class="quote-box"></div>
    <script src="script.js"></script>
</body>
</html>
