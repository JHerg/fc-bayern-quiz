<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>München Fußball Fan-Quiz</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow"></div>

    <div id="start-screen" class="quiz-container main-card">
        <header>
            <div class="logo-container">
                <div class="fan-emblem">
                    <div class="rauten-pattern"></div>
                </div>
            </div>
            <h1>Fan-Quiz München</h1>
            <p class="subtitle">Bist du Weltklasse oder Kreisliga?</p>
            <div class="disclaimer">
                💡 Privates Fan-Projekt. Keine offizielle Verbindung zu einem Verein.
            </div>
        </header>
        
        <div class="difficulty-buttons">
            <button class="btn-diff leicht" onclick="initQuiz('leicht')"><span>🟢</span> Amateur</button>
            <button class="btn-diff mittel" onclick="initQuiz('mittel')"><span>🔵</span> Profi</button>
            <button class="btn-diff schwer" onclick="initQuiz('schwer')"><span>🔴</span> Weltklasse</button>
        </div>

        <div class="start-leaderboards-section">
            <h3>🏆 Hall of Fame (Weltweit)</h3>
            <div class="leaderboards-grid">
                <div class="leaderboard-col">
                    <h4>Leicht</h4>
                    <ol id="start-leaderboard-leicht"></ol>
                </div>
                <div class="leaderboard-col">
                    <h4>Mittel</h4>
                    <ol id="start-leaderboard-mittel"></ol>
                </div>
                <div class="leaderboard-col">
                    <h4>Schwer</h4>
                    <ol id="start-leaderboard-schwer"></ol>
                </div>
            </div>
        </div>
    </div>

    <div id="quiz-container" class="quiz-container main-card" style="display: none;">
        <div class="progress-container">
            <div id="progress-bar-fill"></div>
        </div>

        <div class="stats-header">
            <div class="stat-badge">Punkte: <span id="score">0</span></div>
            <div class="stat-badge highscore">Best: <span id="highscore">0</span></div>
        </div>

        <div class="tools-header">
            <button id="joker-btn" class="btn-joker">🪄 50:50</button>
            <div id="timer-bar-container">
                <div id="timer-bar"></div>
            </div>
        </div>
        
        <div id="quiz">
            <div class="question-box">
                <img id="question-image" src="" alt="Frage" style="display: none;">
                <h2 id="question">Frage lädt...</h2>
            </div>
            <div id="answer-buttons" class="btn-grid"></div>
        </div>

        <div id="result-message"></div>
        <div id="explanation-box" class="explanation-box"></div>
        <button id="next-btn" class="btn-next" style="display: none;">Nächste Frage</button>

        <div id="leaderboard-section" style="display: none;">
            <div class="final-stats">
                <h2 id="final-result-text">Ergebnis</h2>
            </div>
            <div id="leaderboard-form">
                <input type="text" id="player-name" placeholder="Dein Name" maxlength="15">
                <button id="save-score-btn" class="btn-save">Speichern</button>
            </div>
            <ol id="leaderboard-list" class="styled-list"></ol>
            <button onclick="location.reload()" class="btn-restart">Zum Hauptmenü</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script type="module" src="script.js"></script>
</body>
</html>
